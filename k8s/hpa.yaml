apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: picato-hpa 
  namespace: picato-prod  
  labels:
    app: picato
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: picato-deployment
  minReplicas: 3 # Minimum 100 pods humesha chalenge
  maxReplicas: 10 # Load badhne par max 200 tak jayenge
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50  # Agar CPU usage 75% se upar gaya toh naye pods banenge
